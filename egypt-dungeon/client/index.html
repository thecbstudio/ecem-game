<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomb of Khamun ♥ Cinar & Ecem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0A0600;
      overflow: hidden;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-container canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    /* Hide the favicon 404 spam */
    link[rel="icon"] { display: none; }
  </style>
  <link rel="icon" href="data:," />
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 3 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <!-- Socket.io client (served by the Express server) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Shared constants (served from Node) -->
  <script src="/shared/constants.js"></script>

  <!-- Graphics -->
  <script src="js/graphics/EgyptPalette.js"></script>
  <script src="js/graphics/TileRenderer.js"></script>
  <script src="js/graphics/CharacterRenderer.js"></script>
  <script src="js/graphics/EnemyRenderer.js"></script>
  <script src="js/graphics/ItemRenderer.js"></script>

  <!-- UI -->
  <script src="js/ui/HealthBar.js"></script>
  <script src="js/ui/DialogueBox.js"></script>
  <script src="js/ui/InventoryUI.js"></script>
  <script src="js/ui/LootPopup.js"></script>
  <script src="js/ui/Minimap.js"></script>

  <!-- Systems -->
  <script src="js/systems/SoundSystem.js"></script>
  <script src="js/systems/InputSystem.js"></script>
  <script src="js/systems/ParticleSystem.js"></script>

  <!-- Scenes -->
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/MenuScene.js"></script>
  <script src="js/scenes/LobbyScene.js"></script>
  <script src="js/scenes/GameScene.js"></script>
  <script src="js/scenes/GameOverScene.js"></script>

  <!-- Main (must be last) -->
  <script src="js/main.js"></script>
</body>
</html>
